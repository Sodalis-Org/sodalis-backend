name: Release

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        name: Build & push ${{ matrix.service }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [api-gateway, service-domus, service-labor, service-concordia]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/sodalis-${{ matrix.service }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{raw}}
                      type=sha,format=short

            - name: Build & push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.service }}/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    # Première publication GHCR : packages souvent privés par défaut.
    # Les rendre publics permet le pull sans PAT (déploiement doc / démo).
    make-packages-public:
        name: Make GHCR packages public
        runs-on: ubuntu-latest
        needs: build-and-push
        permissions:
            packages: write
        steps:
            - name: Set package visibility to public
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  OWNER="${{ github.repository_owner }}"
                  for pkg in sodalis-api-gateway sodalis-service-domus sodalis-service-labor sodalis-service-concordia; do
                    echo "Setting $pkg public..."
                    gh api --method PUT \
                      -H "Accept: application/vnd.github+json" \
                      "/orgs/${OWNER}/packages/container/${pkg}/visibility" \
                      -f visibility=public
                  done

    github-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build-and-push
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Extract CHANGELOG section for this tag
              id: changelog
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  awk -v ver="$VERSION" '
                    BEGIN { printing = 0 }
                    $0 ~ "^## \\[" ver "\\]" { printing = 1; next }
                    printing && /^## \[/ { exit }
                    printing { print }
                  ' CHANGELOG.md > release-notes.md

            - name: Create or update GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                    gh release edit "$GITHUB_REF_NAME" \
                      --title "$GITHUB_REF_NAME" \
                      --notes-file release-notes.md
                  else
                    gh release create "$GITHUB_REF_NAME" \
                      --title "$GITHUB_REF_NAME" \
                      --notes-file release-notes.md
                  fi
