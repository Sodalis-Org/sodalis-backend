name: CI

on:
    push:
    pull_request:
        branches: [main]

env:
    NODE_VERSION: '22'

jobs:
    quality:
        name: Lint & format
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check
              continue-on-error: true

    test:
        name: Tests & coverage
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Tests + coverage (seuil 60% lignes par service)
              run: npm run test:coverage
              env:
                  JWT_SECRET: ci-test-secret-not-used-in-production

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-backend
                  path: '**/coverage/'

    security:
        name: Dependency audit & secret scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Audit des dépendances (0 high/critical)
              run: npm run audit

            # CLI MIT (gratuit) : gitleaks-action@v2 exige une licence pour les orgs GitHub
            - name: Install gitleaks
              run: |
                  curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
                    | tar -xz -C /tmp
                  sudo mv /tmp/gitleaks /usr/local/bin/

            - name: Scan de secrets
              run: gitleaks detect --source . --verbose --redact

    build:
        name: Build Docker images
        runs-on: ubuntu-latest
        needs: [quality, test]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build images
              run: docker compose build
              env:
                  JWT_SECRET: ci-build-placeholder
                  POSTGRES_PASSWORD: ci-build-placeholder
